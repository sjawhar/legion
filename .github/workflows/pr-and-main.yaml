name: Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint daemon
        run: bunx biome check --error-on-warnings src/
        working-directory: packages/daemon

      - name: Lint opencode-plugin
        run: bunx biome check --error-on-warnings src/
        working-directory: packages/opencode-plugin

  typecheck:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck daemon
        run: bunx tsc --noEmit
        working-directory: packages/daemon

      - name: Typecheck opencode-plugin
        run: bunx tsc --noEmit
        working-directory: packages/opencode-plugin

  test:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Test daemon
        run: bun test
        working-directory: packages/daemon

      - name: Test opencode-plugin
        run: bun test
        working-directory: packages/opencode-plugin

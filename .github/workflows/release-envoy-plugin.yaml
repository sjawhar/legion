name: Release Envoy Plugin

on:
  push:
    branches: [main]
    paths:
      - "packages/envoy-plugin/**"
      - "packages/contracts/**"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          ssh-key: ${{ secrets.DEPLOY_KEY }}
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Determine next version
        id: version
        run: |
          PREV_TAG=$(git tag -l 'opencode-legion-envoy-v*' --sort=-v:refname | head -1)
          if [ -z "$PREV_TAG" ]; then
            PREV_VERSION="0.0.0"
            COMMITS=$(git log HEAD --format='%s' -- packages/envoy-plugin/ packages/contracts/)
          else
            PREV_VERSION="${PREV_TAG#opencode-legion-envoy-v}"
            COMMITS=$(git log "${PREV_TAG}..HEAD" --format='%s' -- packages/envoy-plugin/ packages/contracts/)
          fi

          if [ -z "$COMMITS" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No commits in tracked paths since ${PREV_TAG:-beginning}"
            exit 0
          fi

          MAJOR=false; MINOR=false; PATCH=false
          while IFS= read -r msg; do
            if echo "$msg" | grep -qE '^[a-z]+(\(.+\))?!:' || echo "$msg" | grep -q 'BREAKING CHANGE'; then
              MAJOR=true
            elif echo "$msg" | grep -qE '^feat(\(.+\))?:'; then
              MINOR=true
            elif echo "$msg" | grep -qE '^fix(\(.+\))?:'; then
              PATCH=true
            fi
          done <<< "$COMMITS"

          if ! $MAJOR && ! $MINOR && ! $PATCH; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No version-bumping commits since ${PREV_TAG:-beginning}"
            exit 0
          fi

          IFS='.' read -r MAJ MIN PAT <<< "$PREV_VERSION"
          if $MAJOR; then MAJ=$((MAJ+1)); MIN=0; PAT=0
          elif $MINOR; then MIN=$((MIN+1)); PAT=0
          else PAT=$((PAT+1)); fi

          VERSION="${MAJ}.${MIN}.${PAT}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "Bumping opencode-legion-envoy-v${PREV_VERSION} -> opencode-legion-envoy-v${VERSION}"

      - name: Set release version
        if: steps.version.outputs.skip != 'true'
        run: |
          jq --arg v "${{ steps.version.outputs.version }}" '.version = $v' \
            packages/envoy-plugin/package.json > tmp.json \
            && mv tmp.json packages/envoy-plugin/package.json

      - name: Build plugin
        if: steps.version.outputs.skip != 'true'
        run: bun run build
        working-directory: packages/envoy-plugin

      - name: Pack plugin
        if: steps.version.outputs.skip != 'true'
        run: bun pm pack
        working-directory: packages/envoy-plugin

      - name: Publish to npm
        if: steps.version.outputs.skip != 'true'
        run: npm publish --access public --provenance
        working-directory: packages/envoy-plugin

      - name: Commit, tag, and push
        if: steps.version.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/envoy-plugin/package.json
          git diff --staged --quiet || git commit -m "chore: release envoy-plugin v${{ steps.version.outputs.version }} [skip ci]"
          git tag "opencode-legion-envoy-v${{ steps.version.outputs.version }}"
          git push origin main --tags

      - name: Create GitHub release
        if: steps.version.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "opencode-legion-envoy-v${{ steps.version.outputs.version }}" \
            packages/envoy-plugin/*.tgz \
            --repo "${{ github.repository }}" \
            --title "Envoy Plugin v${{ steps.version.outputs.version }}" \
            --generate-notes \
            --verify-tag

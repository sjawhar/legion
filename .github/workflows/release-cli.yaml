name: Release CLI

on:
  push:
    branches: [main]
    paths:
      - "packages/daemon/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  version:
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.version.outputs.version }}
      skip: ${{ steps.version.outputs.skip }}
    steps:
      - uses: actions/checkout@v5
      - name: Determine next version
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PREV=$(gh release list --repo "${{ github.repository }}" --limit 1000 --json tagName \
            --jq '
              [
                .[] | .tagName
                | select(test("^cli-v[0-9]+\\.[0-9]+\\.[0-9]+$"))
                | sub("^cli-v"; "") | split(".") | map(tonumber)
              ]
              | sort | last
              | if . == null then "cli-v0.0.0" else "cli-v\(.[0]).\(.[1]).\(.[2])" end
            ')
          BASE="${PREV#cli-v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE"
          VERSION="${MAJOR}.${MINOR}.$((PATCH+1))"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if gh release view "cli-v$VERSION" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "cli-v$VERSION already released"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Bumping cli $PREV -> cli-v$VERSION"
          fi

  build:
    needs: version
    if: needs.version.outputs.skip != 'true'
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          - target: bun-linux-x64
            artifact: legion-linux-x64
          - target: bun-darwin-arm64
            artifact: legion-darwin-arm64
          - target: bun-darwin-x64
            artifact: legion-darwin-x64
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build CLI
        run: |
          bun build \
            --compile \
            --target=${{ matrix.target }} \
            --define 'LEGION_VERSION="${{ needs.version.outputs.version }}"' \
            packages/daemon/src/cli/index.ts \
            --outfile ${{ matrix.artifact }}
      - name: Smoke test
        if: matrix.target == 'bun-linux-x64'
        run: ./${{ matrix.artifact }} --help
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: [version, build]
    if: needs.version.outputs.skip != 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          ssh-key: ${{ secrets.DEPLOY_KEY }}
          fetch-depth: 0
      - name: Update daemon package.json version
        run: |
          jq --arg v "${{ needs.version.outputs.version }}" '.version = $v' \
            packages/daemon/package.json > tmp.json \
            && mv tmp.json packages/daemon/package.json
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Commit, tag, and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/daemon/package.json
          git diff --staged --quiet || git commit -m "chore: release cli v${{ needs.version.outputs.version }} [skip ci]"
          git tag "cli-v${{ needs.version.outputs.version }}"
          git push origin main --tags
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "cli-v${{ needs.version.outputs.version }}" \
            artifacts/*/legion-* \
            --repo "${{ github.repository }}" \
            --title "CLI v${{ needs.version.outputs.version }}" \
            --generate-notes \
            --verify-tag

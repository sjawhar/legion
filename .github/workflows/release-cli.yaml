name: Release CLI

on:
  push:
    branches: [main]
    paths:
      - "packages/daemon/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  version:
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.version.outputs.version }}
      skip: ${{ steps.version.outputs.skip }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Determine next version
        id: version
        run: |
          PREV_TAG=$(git tag -l 'cli-v*' --sort=-v:refname | head -1)
          if [ -z "$PREV_TAG" ]; then
            PREV_VERSION="0.0.0"
            COMMITS=$(git log HEAD --format='%s' -- packages/daemon/)
          else
            PREV_VERSION="${PREV_TAG#cli-v}"
            COMMITS=$(git log "${PREV_TAG}..HEAD" --format='%s' -- packages/daemon/)
          fi

          if [ -z "$COMMITS" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No commits in packages/daemon/ since ${PREV_TAG:-beginning}"
            exit 0
          fi

          MAJOR=false; MINOR=false; PATCH=false
          while IFS= read -r msg; do
            if echo "$msg" | grep -qE '^[a-z]+(\(.+\))?!:' || echo "$msg" | grep -q 'BREAKING CHANGE'; then
              MAJOR=true
            elif echo "$msg" | grep -qE '^feat(\(.+\))?:'; then
              MINOR=true
            elif echo "$msg" | grep -qE '^fix(\(.+\))?:'; then
              PATCH=true
            fi
          done <<< "$COMMITS"

          if ! $MAJOR && ! $MINOR && ! $PATCH; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No version-bumping commits since ${PREV_TAG:-beginning}"
            exit 0
          fi

          IFS='.' read -r MAJ MIN PAT <<< "$PREV_VERSION"
          if $MAJOR; then MAJ=$((MAJ+1)); MIN=0; PAT=0
          elif $MINOR; then MIN=$((MIN+1)); PAT=0
          else PAT=$((PAT+1)); fi

          VERSION="${MAJ}.${MIN}.${PAT}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "Bumping cli-v${PREV_VERSION} -> cli-v${VERSION}"

  build:
    needs: version
    if: needs.version.outputs.skip != 'true'
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          - target: bun-linux-x64
            artifact: legion-linux-x64
          - target: bun-darwin-arm64
            artifact: legion-darwin-arm64
          - target: bun-darwin-x64
            artifact: legion-darwin-x64
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build CLI
        run: |
          bun build \
            --compile \
            --target=${{ matrix.target }} \
            --define 'LEGION_VERSION="${{ needs.version.outputs.version }}"' \
            packages/daemon/src/cli/index.ts \
            --outfile ${{ matrix.artifact }}
      - name: Smoke test
        if: matrix.target == 'bun-linux-x64'
        run: ./${{ matrix.artifact }} --help
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: [version, build]
    if: needs.version.outputs.skip != 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          ssh-key: ${{ secrets.DEPLOY_KEY }}
          fetch-depth: 0
      - name: Update daemon package.json version
        run: |
          jq --arg v "${{ needs.version.outputs.version }}" '.version = $v' \
            packages/daemon/package.json > tmp.json \
            && mv tmp.json packages/daemon/package.json
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Commit, tag, and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/daemon/package.json
          git diff --staged --quiet || git commit -m "chore: release cli v${{ needs.version.outputs.version }} [skip ci]"
          git tag "cli-v${{ needs.version.outputs.version }}"
          git push origin main --tags
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "cli-v${{ needs.version.outputs.version }}" \
            artifacts/*/legion-* \
            --repo "${{ github.repository }}" \
            --title "CLI v${{ needs.version.outputs.version }}" \
            --generate-notes \
            --verify-tag

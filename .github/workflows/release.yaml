name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  version:
    name: Determine Version
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.bump.outputs.version }}
      should_release: ${{ steps.bump.outputs.should_release }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Determine version bump
        id: bump
        run: |
          # Find the latest version tag
          LATEST_TAG=$(git tag -l 'v*' --sort=-v:refname | head -1)

          if [ -z "$LATEST_TAG" ]; then
            # No tags yet — first release uses current package.json version
            VERSION=$(jq -r .version package.json)
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "First release: v$VERSION"
            exit 0
          fi

          # Get commits since last tag
          COMMITS=$(git log "${LATEST_TAG}..HEAD" --format='%s')

          if [ -z "$COMMITS" ]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "No commits since $LATEST_TAG"
            exit 0
          fi

          # Classify conventional commits
          MAJOR=false
          MINOR=false
          PATCH=false

          while IFS= read -r msg; do
            # BREAKING: feat!:, fix(scope)!:, or body contains BREAKING CHANGE
            if echo "$msg" | grep -qE '^[a-z]+(\(.+\))?!:' || echo "$msg" | grep -q 'BREAKING CHANGE'; then
              MAJOR=true
            elif echo "$msg" | grep -qE '^feat(\(.+\))?:'; then
              MINOR=true
            elif echo "$msg" | grep -qE '^fix(\(.+\))?:'; then
              PATCH=true
            fi
          done <<< "$COMMITS"

          if ! $MAJOR && ! $MINOR && ! $PATCH; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "No version-bumping commits since $LATEST_TAG"
            exit 0
          fi

          # Parse version from last tag
          CURRENT="${LATEST_TAG#v}"
          IFS='.' read -r major minor patch <<< "$CURRENT"

          if $MAJOR; then
            major=$((major + 1)); minor=0; patch=0
          elif $MINOR; then
            minor=$((minor + 1)); patch=0
          else
            patch=$((patch + 1))
          fi

          VERSION="${major}.${minor}.${patch}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "should_release=true" >> "$GITHUB_OUTPUT"
          echo "Bumping $CURRENT → $VERSION"

  build:
    name: Build (${{ matrix.target }})
    needs: version
    if: needs.version.outputs.should_release == 'true'
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: true
      matrix:
        target:
          - linux-x64
          - linux-arm64
    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Set release version
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          for pkg in package.json packages/daemon/package.json packages/opencode-plugin/package.json; do
            jq --arg v "$VERSION" '.version = $v' "$pkg" > tmp.json && mv tmp.json "$pkg"
          done

      - name: Build daemon binary
        run: bun build --compile --target=bun-${{ matrix.target }} src/cli/index.ts --outfile legion
        working-directory: packages/daemon

      - name: Package
        run: tar czf legion-${{ matrix.target }}.tar.gz -C packages/daemon legion

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: legion-${{ matrix.target }}
          path: legion-${{ matrix.target }}.tar.gz

  plugin:
    name: Build Plugin
    needs: version
    if: needs.version.outputs.should_release == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Set release version
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          for pkg in package.json packages/daemon/package.json packages/opencode-plugin/package.json; do
            jq --arg v "$VERSION" '.version = $v' "$pkg" > tmp.json && mv tmp.json "$pkg"
          done

      - name: Build plugin
        run: bun run build
        working-directory: packages/opencode-plugin

      - name: Pack plugin
        run: bun pm pack
        working-directory: packages/opencode-plugin

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: opencode-legion-plugin
          path: packages/opencode-plugin/*.tgz

  release:
    name: Create Release
    needs: [version, build, plugin]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          ssh-key: ${{ secrets.DEPLOY_KEY }}
          fetch-depth: 0

      - name: Bump version in repo
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          for pkg in package.json packages/daemon/package.json packages/opencode-plugin/package.json; do
            jq --arg v "$VERSION" '.version = $v' "$pkg" > tmp.json && mv tmp.json "$pkg"
          done

      - name: Commit and tag
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json packages/daemon/package.json packages/opencode-plugin/package.json
          git commit -m "chore: release v${VERSION} [skip ci]"
          git tag "v${VERSION}"
          git push origin main --tags

      - uses: actions/download-artifact@v4

      - name: Generate checksums
        run: |
          for dir in legion-linux-x64 legion-linux-arm64 opencode-legion-plugin; do
            (cd "$dir" && sha256sum * >> ../SHA256SUMS)
          done

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --generate-notes \
            legion-*/legion-*.tar.gz \
            opencode-legion-plugin/*.tgz \
            SHA256SUMS

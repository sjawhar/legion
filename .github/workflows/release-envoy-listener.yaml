name: Release Envoy Listener

on:
  push:
    branches: [main]
    paths:
      - "packages/envoy/**"
      - "packages/contracts/**"

permissions:
  contents: write
  packages: write
  id-token: write

concurrency:
  group: release-envoy-listener
  cancel-in-progress: false

jobs:
  version:
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
      should_release: ${{ steps.bump.outputs.should_release }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Determine version bump
        id: bump
        run: |
          LATEST_TAG=$(git tag -l 'legion-envoy-v*' --sort=-v:refname | head -1)

          if [ -z "$LATEST_TAG" ]; then
            VERSION="0.1.0"
            TAG="legion-envoy-v${VERSION}"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "First release: $TAG"
            exit 0
          fi

          # Only consider commits that touch envoy or contracts
          COMMITS=$(git log "${LATEST_TAG}..HEAD" --format='%s' -- packages/envoy/ packages/contracts/)

          if [ -z "$COMMITS" ]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "No envoy/contracts commits since $LATEST_TAG"
            exit 0
          fi

          MAJOR=false
          MINOR=false
          PATCH=false

          while IFS= read -r msg; do
            if echo "$msg" | grep -qE '^[a-z]+(\(.+\))?!:' || echo "$msg" | grep -q 'BREAKING CHANGE'; then
              MAJOR=true
            elif echo "$msg" | grep -qE '^feat(\(.+\))?:'; then
              MINOR=true
            elif echo "$msg" | grep -qE '^fix(\(.+\))?:'; then
              PATCH=true
            fi
          done <<< "$COMMITS"

          if ! $MAJOR && ! $MINOR && ! $PATCH; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "No version-bumping commits since $LATEST_TAG"
            exit 0
          fi

          CURRENT="${LATEST_TAG#legion-envoy-v}"
          CURRENT="${CURRENT%%-*}"
          IFS='.' read -r major minor patch <<< "$CURRENT"

          if $MAJOR; then
            major=$((major + 1)); minor=0; patch=0
          elif $MINOR; then
            minor=$((minor + 1)); patch=0
          else
            patch=$((patch + 1))
          fi

          VERSION="${major}.${minor}.${patch}"
          TAG="legion-envoy-v${VERSION}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "should_release=true" >> "$GITHUB_OUTPUT"
          echo "Bumping $CURRENT → $VERSION"

  build:
    needs: version
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: true
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - uses: actions/setup-go@v5
        with:
          go-version-file: packages/envoy/go.mod
      - name: Generate Go contracts
        run: bun run gen:go
        working-directory: packages/contracts
      - name: Build envoy binary
        run: |
          mkdir -p out
          GOOS=linux GOARCH=${{ matrix.arch }} go build -buildvcs=false -o out/envoy-listener ./cmd/listener
          tar czf legion-envoy-${{ matrix.arch }}.tar.gz -C out envoy-listener
        working-directory: packages/envoy
      - uses: actions/upload-artifact@v4
        with:
          name: legion-envoy-${{ matrix.arch }}
          path: packages/envoy/legion-envoy-${{ matrix.arch }}.tar.gz

  docker:
    needs: [version, build]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: actions/setup-go@v5
        with:
          go-version-file: packages/envoy/go.mod
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Generate Go contracts
        run: bun run gen:go
        working-directory: packages/contracts
      - name: Container smoke test (testcontainers)
        run: go test -tags smoke -v -timeout 5m ./internal/smoke/
        working-directory: packages/envoy
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: packages/envoy
          file: packages/envoy/docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/sjawhar/legion/envoy:${{ github.sha }}
            ghcr.io/sjawhar/legion/envoy:latest

  release:
    needs: [version, build, docker]
    if: needs.version.outputs.should_release == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          ssh-key: ${{ secrets.DEPLOY_KEY }}
          fetch-depth: 0

      - name: Tag release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ needs.version.outputs.tag }}"
          git push origin --tags

      - uses: actions/download-artifact@v4
        with:
          # Skip the *.dockerbuild attestation artifact uploaded automatically
          # by docker/build-push-action. It's not used by the release and has
          # been hanging in Azure blob download (failed both #607 and #608
          # releases). The release only needs the two binary artifacts.
          pattern: legion-envoy-*
      - name: Generate checksums
        run: |
          for dir in legion-envoy-amd64 legion-envoy-arm64; do
            (cd "$dir" && sha256sum * >> ../SHA256SUMS)
          done
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ needs.version.outputs.tag }}" \
            --title "${{ needs.version.outputs.tag }}" \
            --notes "Envoy listener release — Go binary + Docker image." \
            legion-envoy-amd64/* \
            legion-envoy-arm64/* \
            SHA256SUMS

name: Publish Envoy Plugin
run-name: "${{ format('envoy-plugin {0}', inputs.version || inputs.bump) }}"

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Bump major, minor, or patch"
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major
      version:
        description: "Override version (e.g., 1.2.3). Takes precedence over bump."
        required: false
        type: string

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.calc.outputs.version }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - run: git fetch --force --tags

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Calculate version
        id: calc
        env:
          RAW_VERSION: ${{ inputs.version }}
          BUMP: ${{ inputs.bump }}
        run: |
          VERSION="$RAW_VERSION"
          if [ -z "$VERSION" ]; then
            PREV=$(curl -s "https://registry.npmjs.org/@sjawhar%2Fopencode-legion-envoy/latest" | jq -r '.version // "0.0.0"')
            BASE="${PREV%%-*}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE"
            case "$BUMP" in
              major) VERSION="$((MAJOR+1)).0.0" ;;
              minor) VERSION="${MAJOR}.$((MINOR+1)).0" ;;
              *) VERSION="${MAJOR}.${MINOR}.$((PATCH+1))" ;;
            esac
          fi

          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version: $VERSION"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Check if already published
        id: check
        env:
          VERSION: ${{ steps.calc.outputs.version }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://registry.npmjs.org/@sjawhar%2Fopencode-legion-envoy/${VERSION}")
          if [ "$STATUS" = "200" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "✓ @sjawhar/opencode-legion-envoy@${VERSION} already published"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update version
        if: steps.check.outputs.skip != 'true'
        env:
          VERSION: ${{ steps.calc.outputs.version }}
        run: |
          jq --arg v "$VERSION" '.version = $v' packages/envoy-plugin/package.json > tmp.json
          mv tmp.json packages/envoy-plugin/package.json

      - name: Build
        if: steps.check.outputs.skip != 'true'
        run: bun run build
        working-directory: packages/envoy-plugin

      - name: Publish to npm
        if: steps.check.outputs.skip != 'true'
        run: npm publish --access public --provenance
        working-directory: packages/envoy-plugin
        env:
          NPM_CONFIG_PROVENANCE: "true"

  release:
    runs-on: ubuntu-24.04
    needs: publish
    if: needs.publish.outputs.version != ''
    steps:
      - uses: actions/checkout@v5
        with:
          ssh-key: ${{ secrets.DEPLOY_KEY }}
          fetch-depth: 0

      - run: git fetch --force --tags

      - name: Update version in source tree
        env:
          VERSION: ${{ needs.publish.outputs.version }}
        run: |
          jq --arg v "$VERSION" '.version = $v' \
            packages/envoy-plugin/package.json > tmp.json \
            && mv tmp.json packages/envoy-plugin/package.json

      - name: Commit version bump
        env:
          VERSION: ${{ needs.publish.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/envoy-plugin/package.json
          git diff --staged --quiet || git commit -m "chore: release envoy-plugin v${VERSION} [skip ci]"

      - name: Create release tag
        env:
          VERSION: ${{ needs.publish.outputs.version }}
        run: |
          TAG="legion-envoy-plugin-v${VERSION}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "::error::Tag $TAG already exists"
            exit 1
          fi
          git tag "$TAG"

      - name: Push release state
        env:
          VERSION: ${{ needs.publish.outputs.version }}
        run: |
          git push origin HEAD
          git push origin "legion-envoy-plugin-v${VERSION}"

      - name: Create GitHub release
        env:
          VERSION: ${{ needs.publish.outputs.version }}
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="legion-envoy-plugin-v${VERSION}"
          gh release view "$TAG" >/dev/null 2>&1 || \
            gh release create "$TAG" \
              --title "Envoy Plugin v${VERSION}" \
              --notes "Release @sjawhar/opencode-legion-envoy v${VERSION}"

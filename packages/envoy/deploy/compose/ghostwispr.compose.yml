services:
  ghostwispr:
    build:
      context: ../..
      dockerfile: docker/Dockerfile
    network_mode: host
    command: ["/usr/local/bin/envoy-ghostwispr"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:$${PORT}/healthz"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    environment:
      PORT: ${ENVOY_GHOSTWISPR_PORT:-9012}
      ENVOY_MACHINE_ID: ${ENVOY_MACHINE_ID}
      NATS_URLS: ${NATS_URLS}
      ENVOY_GHOSTWISPR_SIGNING_SECRET: ${ENVOY_GHOSTWISPR_SIGNING_SECRET:-}

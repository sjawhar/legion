services:
  slack:
    build:
      context: ../..
      dockerfile: docker/slack.Dockerfile
    network_mode: host
    restart: unless-stopped
    environment:
      PORT: ${ENVOY_SLACK_PORT:-9011}
      ENVOY_MACHINE_ID: ${ENVOY_MACHINE_ID}
      NATS_URLS: ${NATS_URLS}
      ENVOY_SLACK_SIGNING_SECRET: ${ENVOY_SLACK_SIGNING_SECRET}
